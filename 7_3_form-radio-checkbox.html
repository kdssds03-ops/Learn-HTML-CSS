<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <form action="/signup">
    <fieldset>
      <legend>좋아하는 색상을 모두 선택해주세요.</legend>
          <ul>
      <li>
        <label for="red">빨강</label>
        <input type="checkbox" id="red" name="colors" value="red">
      </li>
      <li>
        <label for="orange">주황</label>
        <input type="checkbox" id="orange" name="colors" value="orange">
      </li>
      <li>
        <label for="yellow">노랑</label>
        <input type="checkbox" id="yellow" name="colors" value="yellow">
      </li>
      <li>
        <label for="green">초록</label>
        <input type="checkbox" id="green" name="colors" value="green">
      </li>
      <li>
        <label for="blue">파랑</label>
        <input type="checkbox" id="blue" name="colors" value="blue">
      </li>
    </ul>
    </fieldset>
    <fieldset>
      <legend>배송방법은?</legend>
      <ul>
        <li><label for="free">free</label>
        <input type="radio" name ="delivery" id="free" value="free"></li>
        <li>
          <label for="pay">pay</label>
          <input type="radio" name="delivery" id="pay" value="pay">
        </li>
      </ul>
    </fieldset>
    <fieldset>
      <legend>자기소개서</legend>
      <textarea name="" id="" cols ="15" rows="5">저는 김현민입니다.</textarea>
    </fieldset>
    <fieldset>
      <legend>주문 상품을 선택해주세요.</legend>
      <ul>
        <li><select name="goods" id="goods" multiple>
          <option value="apple_10kg" >10kg</option>
          <option value="apple_20kg"selected>20kg</option>
          <option value="apple_30kg">30kg</option>
          <option value="apple_40kg">40kg</option>
          <option value="apple_50kg">50kg</option>
        </select></li>
        <li>
          <label for="ice-cream-choice">맛을 선택하세요.</label>
          <input list="ice-cream-flavors" id="ice-cream-choice"name = "ice-cream-choice">
          <datalist id="ice-cream-flavors">
            <option value="바닐라">
            <option value="초콜릿">
            <option value="딸기">
          </datalist>
        </li>
      </ul>
    </fieldset>
    <button type="submit">제출하기</button>
    <button type="reset">초기화</button>
    <button type="button" onclick="alert('버튼이 클릭되었습니다!')">버튼</button>
  </form>
</body>
</html>
