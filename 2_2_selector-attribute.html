<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attribute Selector</title>
  <style>
    /* 속성 선택자 */
    h2[class]{
      font-size: 30px;
    }
    [target]{
      color: red;
    }
    /* 속성 값과 일치하는 요소 */
    h2[class="naver-title"]{
      color: green;
    }
    /* 속성 값이 포함된 요소 */
    a[href*="www"]{
      text-decoration: none;
    }
    /* 속성 값으로 시작하는 요소 */
    a[href^="google"]{
      color: blue;
    }
     /* 속성 값으로 끝나는 요소 */
    a[href$="facebook.com"]{
      color: red;
    }
    /* 속성에 단어가 포함되는 요소 */
    h2[class~="title"]{
      color: orange;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h2 class="naver-title">네이버</h2>
  <a href="https://www.naver.com">네이버</a>

  <h2 class="google-title">구글</h2>
  <a href="https://www.google.com" target="_blank">구글</a>

  <h2 class="facebook-title">페이스북</h2>
  <a href="https://www.facebook.com">페이스북</a>
  <h2>김현민</h2>
  <h2 class=" text title">감사합니다.</h2c>
</body>
</html>
