<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS</title>
  <style>
    .green--text {
      color: green;
    }
    .text-decoration-none {
      text-decoration: none;
    }
    #dark {
      background-color: black;
      color: white;

    }
    .blue {
      color: blue;
    }
  </style>
  <!-- id 는 #, class 는 . -->
</head>
<body>
  <h1 style="color: blue;">제목</h1>
  <p class="green--text">안녕하세요 실용적인 채널을 만들어가는 김현민입니다.</p>
  <hr>
  <a class="text-decoration-none" href="https://www.naver.com">네이버</a>
  <span>이름 : </span><span>김현민</span>
  <ul>
    <li>사과</li>
    <li>바나나</li>
    <li>오렌지</li>
    <li>포도</li>
  </ul>
  <hr>
  <p id="dark">동해물과 <span class="blue">백두산</span>이 마르고<br> 닳도록 <span class="blue">하느님이</span> 보우하사 우리나라 만세<br> (후렴) 무궁화 삼천리 화려강산 대한 사람 대한으로<br> 길이 보전하세.</p>
</body>
</html>
